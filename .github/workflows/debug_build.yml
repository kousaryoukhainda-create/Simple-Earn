name: Debug Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --rerun-tasks --info 2>&1 | tee build.log
    
    - name: List build output
      run: |
        ls -la app/build/outputs/ || echo "No outputs dir"
        ls -la app/build/outputs/apk/ || echo "No APK dir"
        ls -la app/build/outputs/apk/debug/ || echo "No debug APK dir"
        # Check if APK exists in the correct path
        if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "ERROR: APK not found at app/build/outputs/apk/debug/app-debug.apk"
          echo "Searching for APK files..."
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          exit 1
        fi
        echo "APK found successfully at app/build/outputs/apk/debug/app-debug.apk"
    
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
